name: Copilot Web Relay Docs Sync

on:
  push:
    paths:
      - '2.copilotWebRelay/**'
  pull_request:
    paths:
      - '2.copilotWebRelay/**'

jobs:
  agentic-docs-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GitHub CLI
        uses: cli/gh-action@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          cd 2.copilotWebRelay
          npm ci || npm install

      - name: Run Agentic Workflow (gh-aw)
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          npx gh-aw docs --src ./2.copilotWebRelay --out ./2.copilotWebRelay/docs

      - name: Commit & Push docs if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 2.copilotWebRelay/docs
          git diff --cached --quiet || git commit -m "docs: copilotWebRelay ドキュメント自動同期"
          git push
