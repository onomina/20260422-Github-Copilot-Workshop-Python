<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>ポモドーロタイマー</h1>
        <div class="timer-section">
            <div class="progress-circle">
                <canvas id="progressCanvas" width="180" height="180"></canvas>
                <div class="timer-display" id="timer-display">{{ '%02d' % work_minutes }}:{{ '%02d' % initial_seconds }}</div>
            </div>
            <div class="status" id="status">停止中</div>
            <div class="button-group">
                <button id="start-btn">開始</button>
                <button id="pause-btn">一時停止</button>
                <button id="reset-btn">リセット</button>
            </div>
            <!-- 作業/休憩時間カスタマイズUI -->
            <div class="customize-section">
                <div class="customize-title"><span class="customize-icon">⚙️</span>タイマー設定</div>
                <div class="customize-desc">自分に合った作業・休憩時間を設定できます</div>
                <div class="customize-inputs">
                    <div class="customize-row">
                        <label for="work-minutes-input" class="customize-label">作業</label>
                        <input type="number" id="work-minutes-input" min="1" max="120" value="25" class="customize-input"> <span class="customize-unit">分</span>
                    </div>
                    <div class="customize-row">
                        <label for="break-minutes-input" class="customize-label">休憩</label>
                        <input type="number" id="break-minutes-input" min="1" max="60" value="5" class="customize-input"> <span class="customize-unit">分</span>
                    </div>
                    <button id="save-settings-btn" class="customize-save-btn">保存してリセット</button>
                </div>
            </div>
            <!-- 進捗表示エリア -->
            <div class="progress-summary">
                <div class="summary-title">今日の進捗</div>
                <div class="summary-content">
                    <div class="summary-item">
                        <span id="pomodoro-count">0</span><span class="summary-label"> 完了</span>
                    </div>
                    <div class="summary-item">
                        <span id="focus-time">0分</span><span class="summary-label"> 集中時間</span>
                    </div>
                </div>
            </div>
            <div class="gamification-section">
                <div class="summary-title">ゲーミフィケーション</div>
                <div class="summary-content">
                    <div class="summary-item">
                        <span id="xp-value">0</span><span class="summary-label"> XP</span>
                    </div>
                    <div class="summary-item">
                        <span id="level-value">Lv.1</span><span class="summary-label"> レベル</span>
                    </div>
                </div>
                <div class="streak-line">🔥 連続日数: <span id="streak-days">0</span>日</div>
                <div class="badge-list" id="badge-list">達成バッジはまだありません</div>
            </div>
            <div class="stats-section">
                <div class="summary-title">週間 / 月間統計</div>
                <div class="stats-block">
                    <div class="stats-label">週間 完了率 <span id="weekly-completion-rate">0%</span></div>
                    <div class="stats-bar"><div class="stats-fill" id="weekly-completion-bar"></div></div>
                    <div class="stats-label">週間 平均集中時間 <span id="weekly-average-focus">0分</span></div>
                    <div class="stats-bar"><div class="stats-fill stats-fill-focus" id="weekly-focus-bar"></div></div>
                </div>
                <div class="stats-block">
                    <div class="stats-label">月間 完了率 <span id="monthly-completion-rate">0%</span></div>
                    <div class="stats-bar"><div class="stats-fill" id="monthly-completion-bar"></div></div>
                    <div class="stats-label">月間 平均集中時間 <span id="monthly-average-focus">0分</span></div>
                    <div class="stats-bar"><div class="stats-fill stats-fill-focus" id="monthly-focus-bar"></div></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/beep.js" type="module"></script>
        <script>
            window.INITIAL_WORK_MINUTES = {{ work_minutes }};
            window.INITIAL_SECONDS = {{ initial_seconds }};
        </script>
        <script src="/static/js/timer.js" type="module"></script>
</body>
</html>
